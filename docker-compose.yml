services:
  postgres:
    image: postgres:16
    container_name: tfm-task-client-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tfm_task_client
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
